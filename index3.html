<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="src/images/logo.png" alt="Logo" class="logo">
            <h1>Formulario de registro</h1>
            <div class="doctor-icon">
                <img src="src/images/doctor.png" alt="Doctor">
            </div>
        </header>

        <form>

            <div class="form-left">
                <label for="ejercicio">¿Realizas ejercicio físico regularmente?</label>
                <input type="text" id="ejercicio" placeholder="Digite su respuesta">

                <label for="alcohol">¿Consumes alcohol frecuentemente?</label>
                <input type="text" id="alcohol" placeholder="Digite su respuesta">

                <label for="peso">¿Cuál es su peso?</label>
                <input type="text" id="peso" placeholder="Digite su peso">

                <label for="altura">¿Cuál es su altura?</label>
                <input type="text" id="altura" placeholder="Digite su altura">

            </div>

            <div class="image">
                <img src="src/images/doctor_patient.jpeg" alt="Doctor con paciente">
            </div>

        </form>

        <div class="button-register">
            <button type="submit" id="registrar">Registrar</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
