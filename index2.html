<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="src/images/logo.png" alt="Logo" class="logo">
            <h1>Formulario de registro</h1>
            <div class="doctor-icon">
                <img src="src/images/doctor.png" alt="Doctor">
            </div>
        </header>

        <form>

            <div class="form-left">
                <label for="sistolica">Presión arterial sistólica (mmHg)</label>
                <input type="text" id="sistolica" placeholder="Seleccione su presión">

                <label for="diastolica">Presión arterial diastólica (mmHg)</label>
                <input type="text" id="diastolica" placeholder="Seleccione su presión">

                <label for="colesterolTotal">Colesterol total (mg/dL)</label>
                <input type="text" id="colesterolTotal" placeholder="Seleccione su presión">

                <label for="colesterolLDL">Colesterol LDL (mg/dL)</label>
                <input type="text" id="colesterolLDL" placeholder="Seleccione su colesterol">

                <label for="colesterolHDL">Colesterol HDL (mg/dL)</label>
                <input type="text" id="colesterolHDL" placeholder="Seleccione su colesterol">

            </div>

            <div class="image">
                <img src="src/images/doctor_patient.jpeg" alt="Doctor con paciente">
            </div>

        </form>

        <div class="button-register">
            <button type="submit" id="registrar">Registrar</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
