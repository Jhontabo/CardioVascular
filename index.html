<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <img src="src/images/logo.png" alt="Logo" class="logo">
            <h1>Formulario de registro</h1>
            <div class="doctor-icon">
                <img src="src/images/doctor.png" alt="Doctor">
            </div>
        </header>

        <form>

            <div class="form-left">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Digite su nombre">

                <label for="identificacion">Número de identificación</label>
                <input type="text" id="identificacion" placeholder="Digite el número">

                <label for="tipo-usuario">Tipo de usuario</label>
                <select id="tipo-usuario">
                    <option value="">Seleccione su rol</option>
                    <option value="paciente">Paciente</option>
                    <option value="doctor">Doctor</option>
                </select>

                <label for="edad">Edad</label>
                <input type="number" id="edad" placeholder="Seleccione su edad">

                <label for="sexo">Genero</label>
                <select id="sexo">
                    <option value="">Seleccione su genero</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                </select>

                <label for="diabetes">¿Tiene diabetes?</label>
                <select id="sexo">
                    <option value="">Seleccione su respuesta</option>
                    <option value="Si">Si</option>
                    <option value="No">No</option>
                </select>

                <label for="fumas">¿Fumas actualmente?</label>
                <select id="fumas">
                    <option value="">Seleccione su respuesta</option>
                    <option value="Si">Si</option>
                    <option value="No">No</option>
                </select>

            </div>

            <div class="image">
                <img src="src/images/doctor_patient.jpeg" alt="Doctor con paciente">
            </div>

        </form>

        <div class="button-register">
            <button type="submit" id="registrar">Registrar</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
